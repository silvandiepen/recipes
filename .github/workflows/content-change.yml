name: Emila Content Change

on:
  workflow_dispatch:
    inputs:
      clientId:
        required: true
        type: string
      jobId:
        required: true
        type: string
      revisionId:
        required: true
        type: string
      senderEmail:
        required: true
        type: string
      requestText:
        required: true
        type: string
      contentBranch:
        required: true
        type: string
      productionBranch:
        required: true
        type: string
      editablePaths:
        required: true
        type: string
      defaultLanguage:
        required: true
        type: string
      supportedLanguages:
        required: true
        type: string
      installCommand:
        required: false
        type: string
      buildCommand:
        required: false
        type: string
      outputDirectory:
        required: true
        type: string
      previewUrl:
        required: true
        type: string
      editRequestUrl:
        required: true
        type: string
      previewResetUrl:
        required: true
        type: string
      previewUploadUrl:
        required: true
        type: string
      workflowToken:
        required: true
        type: string
      platformCallbackUrl:
        required: true
        type: string
      platformCallbackToken:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-content-change:
    runs-on: ubuntu-latest
    env:
      CLIENT_ID: ${{ inputs.clientId }}
      JOB_ID: ${{ inputs.jobId }}
      REVISION_ID: ${{ inputs.revisionId }}
      SENDER_EMAIL: ${{ inputs.senderEmail }}
      REQUEST_TEXT: ${{ inputs.requestText }}
      CONTENT_BRANCH: ${{ inputs.contentBranch }}
      PRODUCTION_BRANCH: ${{ inputs.productionBranch }}
      EDITABLE_PATHS: ${{ inputs.editablePaths }}
      DEFAULT_LANGUAGE: ${{ inputs.defaultLanguage }}
      SUPPORTED_LANGUAGES: ${{ inputs.supportedLanguages }}
      INSTALL_COMMAND: ${{ inputs.installCommand }}
      BUILD_COMMAND: ${{ inputs.buildCommand }}
      OUTPUT_DIRECTORY: ${{ inputs.outputDirectory }}
      PREVIEW_URL: ${{ inputs.previewUrl }}
      EDIT_REQUEST_URL: ${{ inputs.editRequestUrl }}
      PREVIEW_RESET_URL: ${{ inputs.previewResetUrl }}
      PREVIEW_UPLOAD_URL: ${{ inputs.previewUploadUrl }}
      WORKFLOW_TOKEN: ${{ inputs.workflowToken }}
      PLATFORM_CALLBACK_URL: ${{ inputs.platformCallbackUrl }}
      PLATFORM_CALLBACK_TOKEN: ${{ inputs.platformCallbackToken }}
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_RUN_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Emila content workflow script
        run: |
          curl -fsSL https://cdn.emila.dev/workflows/content-change.sh -o /tmp/emila-content-change.sh
          chmod +x /tmp/emila-content-change.sh
          /tmp/emila-content-change.sh
