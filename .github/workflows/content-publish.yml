name: Emila Publish

on:
  workflow_dispatch:
    inputs:
      clientId:
        required: true
        type: string
      jobId:
        required: true
        type: string
      revisionId:
        required: true
        type: string
      senderEmail:
        required: true
        type: string
      contentBranch:
        required: true
        type: string
      productionBranch:
        required: true
        type: string
      commitSha:
        required: true
        type: string
      previewUrl:
        required: true
        type: string
      branchName:
        required: true
        type: string
      pullRequestNumber:
        required: true
        type: string
      pullRequestUrl:
        required: false
        type: string
      workflowToken:
        required: true
        type: string
      platformCallbackUrl:
        required: true
        type: string
      platformCallbackToken:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  publish-content:
    runs-on: ubuntu-latest
    env:
      CLIENT_ID: ${{ inputs.clientId }}
      JOB_ID: ${{ inputs.jobId }}
      REVISION_ID: ${{ inputs.revisionId }}
      SENDER_EMAIL: ${{ inputs.senderEmail }}
      CONTENT_BRANCH: ${{ inputs.contentBranch }}
      PRODUCTION_BRANCH: ${{ inputs.productionBranch }}
      COMMIT_SHA: ${{ inputs.commitSha }}
      PREVIEW_URL: ${{ inputs.previewUrl }}
      BRANCH_NAME: ${{ inputs.branchName }}
      PULL_REQUEST_NUMBER: ${{ inputs.pullRequestNumber }}
      PULL_REQUEST_URL: ${{ inputs.pullRequestUrl }}
      WORKFLOW_TOKEN: ${{ inputs.workflowToken }}
      PLATFORM_CALLBACK_URL: ${{ inputs.platformCallbackUrl }}
      PLATFORM_CALLBACK_TOKEN: ${{ inputs.platformCallbackToken }}
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_RUN_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Emila publish workflow script
        run: |
          curl -fsSL https://cdn.emila.dev/workflows/content-publish.sh -o /tmp/emila-content-publish.sh
          chmod +x /tmp/emila-content-publish.sh
          /tmp/emila-content-publish.sh
